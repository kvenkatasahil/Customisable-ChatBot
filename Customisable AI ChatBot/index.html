<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Onboarding Container -->
    <div class="onboarding-container" id="onboarding-container">
        <div class="onboarding-header">
            <div class="onboarding-logo">
                <i class="fas fa-hand-holding-heart"></i>
            </div>
            <h2>AI Wellness Hub</h2>
            <p>Select a specialist to begin your personalized consultation</p>
        </div>
        
        <!-- Screen 1: Select Persona -->
        <div class="onboarding-screen active" id="screen-select-persona">
            <div class="persona-grid" id="persona-grid">
                <!-- Dynamically generated from config.js -->
            </div>
        </div>

        <!-- Screen 2: User Intake Form -->
        <div class="onboarding-screen" id="screen-user-info" style="display: none;">
            <button id="back-to-personas" class="btn-back">
                <i class="fas fa-chevron-left"></i> Change Specialist
            </button>
            <div class="selected-persona-preview" id="selected-persona-preview">
                <!-- Dynamically updated -->
            </div>
            <form id="user-info-form">
                <div class="form-scroll-container">
                    <div id="dynamic-inputs-container">
                        <!-- Dynamically generated fields -->
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="submit-intake-btn">
                    Start Consultation <i class="fas fa-chevron-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Chat Interface (Initially Hidden) -->
    <div class="chat-container hidden" id="chat-container">
        <div class="chat-header" id="chat-header">
            <button id="back-to-onboarding" class="header-back-btn" title="Change Specialist">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="logo-placeholder" id="chat-header-logo">
                <i class="fas fa-robot" id="chat-header-icon"></i>
            </div>
            <div class="header-info">
                <h2 id="chat-header-title">AI Assistant</h2>
                <p id="chat-header-subtitle">Powered by LLaMA & Groq</p>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                <div class="message-content" id="first-welcome-msg">
                    Hello! I'm your AI assistant. How can I help you today?
                </div>
            </div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-btn" title="Send Message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
    
    <div class="setup-notice" id="setup-notice">
        <h3><i class="fas fa-exclamation-triangle"></i> API Key Required</h3>
        <p>Please add your Groq API key in the <code>config.js</code> file to start using the chatbot.</p>
        <button id="close-notice">Got it</button>
    </div>

    <!-- Config script loaded first -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
